<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kopi Searah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/dashboard/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/dashboard/styles.css" />
  </head>
  <body class="bg-stone-100 text-stone-800">
    <div id="loginPage" class="hidden">
      <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-amber-50 to-stone-100 p-4">
        <div class="bg-white rounded-3xl shadow-soft border border-amber-100 w-full max-w-md p-8">
          <div class="text-center mb-6">
            <img src="assets/logo.jpg" alt="Logo" class="w-20 h-20 rounded-2xl mx-auto mb-4 object-cover border border-amber-100" />
            <h1 class="text-2xl font-black text-primary-700">Kopi Searah</h1>
            <p class="text-sm text-slate-500">Login untuk akses dashboard</p>
          </div>

          <div class="space-y-4">
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
              <input type="email" id="loginEmail" class="input w-full" placeholder="admin@kopisearah.com" />
            </div>
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
              <div class="password-field">
                <input type="password" id="loginPassword" class="input w-full" placeholder="••••••••" data-password-input />
                <button type="button" class="password-toggle" data-password-toggle aria-label="Tampilkan password" aria-pressed="false">
                  <svg class="icon-eye" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                  </svg>
                  <svg class="icon-eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M10.6 5.2A11 11 0 0 1 12 5c6.5 0 10 7 10 7a18.7 18.7 0 0 1-2.4 3.2M6.4 6.4C3.7 8.2 2 12 2 12s3.5 7 10 7c1.5 0 2.8-.3 4-.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M9.9 9.9A3 3 0 0 0 14.1 14.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                </button>
              </div>
            </div>
            <button onclick="handleLogin()" class="btn btn-primary w-full">Login</button>
          </div>
          <p class="text-center text-sm text-slate-500 mt-4">
            Hubungi Super Admin untuk akun baru
          </p>
        </div>
      </div>
    </div>

    <div class="min-h-screen flex hidden" id="layoutRoot">
      <aside
        id="sidebar"
        class="sidebar bg-white border-r border-amber-100 px-4 py-5 hidden lg:block"
      >
        <div class="flex items-center justify-between gap-2 mb-6">
          <div class="flex items-center gap-3 min-w-0 sidebar-brand">
            <img
              src="assets/logo.jpg"
              alt="Logo"
              class="w-11 h-11 rounded-xl object-cover border border-amber-100"
            />
            <div class="sidebar-brand-text min-w-0">
              <p
                class="font-extrabold text-primary-700 text-lg leading-tight truncate"
              >
                Kopi Searah
              </p>
              <p class="text-xs text-slate-500 truncate">Kasir & Manajemen</p>
            </div>
          </div>
        </div>

        <nav id="sidebarNav" class="space-y-3"></nav>
      </aside>

      <main class="flex-1 p-4 sm:p-6 lg:p-8 overflow-hidden">
        <header
          class="bg-white rounded-2xl p-4 sm:p-5 mb-6 shadow-soft border border-amber-100 flex items-center justify-between gap-4"
        >
          <div class="flex items-center gap-3 min-w-0 flex-1">
            <button
              id="sidebarToggleBtn"
              type="button"
              class="inline-flex items-center justify-center w-11 h-11 rounded-xl border border-amber-200 text-primary-700 bg-white hover:bg-amber-50 transition lg:flex-shrink-0"
              aria-label="Buka tutup sidebar"
            >
              <svg
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <line x1="4" y1="6" x2="20" y2="6"></line>
                <line x1="4" y1="12" x2="20" y2="12"></line>
                <line x1="4" y1="18" x2="20" y2="18"></line>
              </svg>
            </button>
            <div class="min-w-0">
              <h1
                id="pageTitle"
                class="text-2xl font-black text-primary-700 truncate"
              >
                Dashboard
              </h1>
              <p id="pageSubtitle" class="text-sm text-slate-500 truncate">
                Ringkasan operasional hari ini
              </p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div class="hidden sm:flex items-center gap-2 bg-amber-50 rounded-xl px-4 py-2 border border-amber-100">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c4521" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <span id="userName" class="text-sm font-semibold text-primary-700">Admin</span>
            </div>
            <button
              onclick="handleLogout()"
              class="btn btn-danger text-sm"
            >
              Logout
            </button>
          </div>
        </header>

        <section
          id="dbAlert"
          class="hidden mb-4 px-4 py-3 rounded-xl border text-sm"
        ></section>

        <section id="view-dashboard" class="view-section space-y-6"></section>
        <section
          id="view-kasir"
          class="view-section hidden space-y-6"
        ></section>
        <section
          id="view-produk"
          class="view-section hidden space-y-6"
        ></section>
        <section
          id="view-kategori"
          class="view-section hidden space-y-6"
        ></section>
        <section
          id="view-meja"
          class="view-section hidden space-y-6"
        ></section>
        <section
          id="view-transaksi"
          class="view-section hidden space-y-6"
        ></section>
        <section
          id="view-pesanan"
          class="view-section hidden space-y-6"
        ></section>
        <section
          id="view-register"
          class="view-section hidden space-y-6"
        ></section>
        <section
          id="view-laporan"
          class="view-section hidden space-y-6"
        ></section>
      </main>
    </div>

    <div id="mobileMenu" class="fixed inset-0 z-50 hidden lg:hidden">
      <div class="absolute inset-0 bg-black/40" data-close-mobile></div>
      <div class="absolute left-0 top-0 h-full w-72 bg-white p-5 shadow-2xl">
        <div class="flex items-center justify-between mb-5">
          <p class="font-black text-primary-700">Kopi Searah</p>
          <button data-close-mobile class="text-slate-500">Tutup</button>
        </div>
        <nav id="mobileNav" class="space-y-3"></nav>
      </div>
    </div>

    <dialog
      id="productDialog"
      class="w-full max-w-xl rounded-2xl border border-amber-100 p-0 backdrop:bg-black/40"
    ></dialog>
    <dialog
      id="categoryDialog"
      class="w-full max-w-xl rounded-2xl border border-amber-100 p-0 backdrop:bg-black/40"
    ></dialog>
    <dialog
      id="trxDetailDialog"
      class="w-full max-w-2xl rounded-2xl border border-amber-100 p-0 backdrop:bg-black/40"
    ></dialog>
    <dialog
      id="qrDialog"
      class="w-full max-w-xl rounded-2xl border border-amber-100 p-0 backdrop:bg-black/40"
    ></dialog>
    <dialog
      id="registerDialog"
      class="w-full max-w-md rounded-2xl border border-amber-100 p-0 backdrop:bg-black/40"
    ></dialog>
    <dialog
      id="productImageDialog"
      class="w-full max-w-3xl rounded-2xl border border-amber-100 p-0 backdrop:bg-black/60"
    ></dialog>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/dashboard/app.js"></script>
  </body>
</html>
