<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kopi Searah</title>
    <script script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                50: '#fbf7f2',
                100: '#f3e7d8',
                500: '#c08457',
                600: '#a15f34',
                700: '#7c4521',
              },
            },
            boxShadow: {
              soft: '0 10px 30px rgba(124, 69, 33, 0.12)',
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-stone-100 text-stone-800">
    <div class="min-h-screen flex" id="layoutRoot">
      <aside
        id="sidebar"
        class="sidebar bg-white border-r border-amber-100 px-4 py-5 hidden lg:block"
      >
        <div class="flex items-center justify-between gap-2 mb-6">
          <div class="flex items-center gap-3 min-w-0 sidebar-brand">
            <img
              src="assets/logo.jpg"
              alt="Logo"
              class="w-11 h-11 rounded-xl object-cover border border-amber-100"
            />
            <div class="sidebar-brand-text min-w-0">
              <p
                class="font-extrabold text-primary-700 text-lg leading-tight truncate"
              >
                Kopi Searah
              </p>
              <p class="text-xs text-slate-500 truncate">Kasir & Manajemen</p>
            </div>
          </div>
        </div>

        <nav id="sidebarNav" class="space-y-3"></nav>
      </aside>

      <main class="flex-1 p-4 sm:p-6 lg:p-8 overflow-hidden">
        <header
          class="bg-white rounded-2xl p-4 sm:p-5 mb-6 shadow-soft border border-amber-100 flex items-center justify-between gap-4"
        >
          <div class="flex items-center gap-3 min-w-0 flex-1">
            <button
              id="sidebarToggleBtn"
              type="button"
              class="inline-flex items-center justify-center w-11 h-11 rounded-xl border border-amber-200 text-primary-700 bg-white hover:bg-amber-50 transition lg:flex-shrink-0"
              aria-label="Buka tutup sidebar"
            >
              <svg
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <line x1="4" y1="6" x2="20" y2="6"></line>
                <line x1="4" y1="12" x2="20" y2="12"></line>
                <line x1="4" y1="18" x2="20" y2="18"></line>
              </svg>
            </button>
            <div class="min-w-0">
              <h1
                id="pageTitle"
                class="text-2xl font-black text-primary-700 truncate"
              >
                Dashboard
              </h1>
              <p id="pageSubtitle" class="text-sm text-slate-500 truncate">
                Ringkasan operasional hari ini
              </p>
            </div>
          </div>
        </header>

        <section
          id="dbAlert"
          class="hidden mb-4 px-4 py-3 rounded-xl border text-sm"
        ></section>

        <section id="view-dashboard" class="view-section space-y-6"></section>
        <section
          id="view-kasir"
          class="view-section hidden space-y-6"
        ></section>
        <section
          id="view-produk"
          class="view-section hidden space-y-6"
        ></section>
        <section
          id="view-kategori"
          class="view-section hidden space-y-6"
        ></section>
        <section
          id="view-transaksi"
          class="view-section hidden space-y-6"
        ></section>
        <section
          id="view-laporan"
          class="view-section hidden space-y-6"
        ></section>
      </main>
    </div>

    <div id="mobileMenu" class="fixed inset-0 z-50 hidden lg:hidden">
      <div class="absolute inset-0 bg-black/40" data-close-mobile></div>
      <div class="absolute left-0 top-0 h-full w-72 bg-white p-5 shadow-2xl">
        <div class="flex items-center justify-between mb-5">
          <p class="font-black text-primary-700">Kopi Searah</p>
          <button data-close-mobile class="text-slate-500">Tutup</button>
        </div>
        <nav id="mobileNav" class="space-y-3"></nav>
      </div>
    </div>

    <dialog
      id="productDialog"
      class="w-full max-w-xl rounded-2xl border border-amber-100 p-0 backdrop:bg-black/40"
    ></dialog>
    <dialog
      id="categoryDialog"
      class="w-full max-w-xl rounded-2xl border border-amber-100 p-0 backdrop:bg-black/40"
    ></dialog>
    <dialog
      id="trxDetailDialog"
      class="w-full max-w-2xl rounded-2xl border border-amber-100 p-0 backdrop:bg-black/40"
    ></dialog>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
